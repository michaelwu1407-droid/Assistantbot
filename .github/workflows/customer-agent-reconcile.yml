name: Customer Agent Reconcile

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconcile Twilio routing and worker drift
        env:
          APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          OPS_KEY: ${{ secrets.TELEMETRY_ADMIN_KEY || secrets.CRON_SECRET }}
        run: |
          node scripts/run-ops-monitor.mjs \
            --path /api/cron/customer-agent-reconcile \
            --label customer-agent-reconcile

name: Deploy LiveKit Agent

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-livekit-agent
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [primary, secondary]
    env:
      DEPLOY_HOST: ${{ matrix.target == 'primary' && (secrets.SSH_HOST_PRIMARY || secrets.SSH_HOST) || secrets.SSH_HOST_SECONDARY }}
      DEPLOY_USER: ${{ matrix.target == 'primary' && (secrets.SSH_USERNAME_PRIMARY || secrets.SSH_USERNAME) || secrets.SSH_USERNAME_SECONDARY }}
      DEPLOY_KEY: ${{ matrix.target == 'primary' && (secrets.SSH_PRIVATE_KEY_PRIMARY || secrets.SSH_PRIVATE_KEY) || secrets.SSH_PRIVATE_KEY_SECONDARY }}
      VOICE_HOST_ID: ${{ matrix.target == 'primary' && (vars.VOICE_HOST_ID_PRIMARY || secrets.VOICE_HOST_ID_PRIMARY) || (vars.VOICE_HOST_ID_SECONDARY || secrets.VOICE_HOST_ID_SECONDARY) }}
    steps:
      - name: Check Out Repo
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: actions/checkout@v4

      - name: Validate Target Configuration
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          if [ -z "${VOICE_HOST_ID:-}" ]; then
            echo "VOICE_HOST_ID is required for the ${{ matrix.target }} target."
            echo "Set vars.VOICE_HOST_ID_PRIMARY / vars.VOICE_HOST_ID_SECONDARY (or matching secrets) to the real OCI host IDs."
            exit 1
          fi
          case "$VOICE_HOST_ID" in
            voice-host-a|voice-host-b|voice-host-*|placeholder-*|changeme-*|example-*|example)
              echo "VOICE_HOST_ID for ${{ matrix.target }} is still a placeholder: $VOICE_HOST_ID"
              echo "Configure the real host ID in repo vars or secrets before deploying."
              exit 1
              ;;
          esac
          echo "Validated target ${{ matrix.target }} with VOICE_HOST_ID=$VOICE_HOST_ID"

      - name: Prepare SSH Credentials
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/deploy-livekit.key"
          printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > "$key_path"
          chmod 600 "$key_path"
          echo "SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "REMOTE_ARCHIVE_PATH=/tmp/earlymark-agent-deploy-${GITHUB_SHA}.tgz" >> "$GITHUB_ENV"
          echo "REMOTE_INSTALL_SCRIPT_PATH=/tmp/earlymark-worker-install-${GITHUB_SHA}.sh" >> "$GITHUB_ENV"
          echo "REMOTE_VERIFY_SCRIPT_PATH=/tmp/earlymark-worker-verify-${GITHUB_SHA}.sh" >> "$GITHUB_ENV"

      - name: Package Agent
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          rm -rf deploy-stage
          mkdir -p deploy-stage/systemd
          cp -a livekit-agent/. deploy-stage/
          cp ops/systemd/earlymark-sales-agent.service deploy-stage/systemd/
          cp ops/systemd/earlymark-customer-agent.service deploy-stage/systemd/
          tar \
            --exclude='node_modules' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            -czf earlymark-agent-deploy.tgz \
            -C deploy-stage .
          du -h earlymark-agent-deploy.tgz
          sha256sum earlymark-agent-deploy.tgz

      - name: Preflight SSH
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          print_ssh_network_guidance() {
            echo "SSH preflight guidance:"
            echo "- Confirm DEPLOY_HOST resolves to the expected OCI public IP (primary currently expected: 140.238.198.39)."
            echo "- Confirm OCI security lists / NSGs allow inbound TCP 22 from GitHub-hosted runners."
            echo "- Confirm Ubuntu iptables also allows TCP 22; OCI can be open while the host firewall silently drops SSH."
            echo "- If the host firewall reblocked SSH, run:"
            echo "  sudo iptables -I INPUT -p tcp --dport 22 -j ACCEPT"
            echo "  sudo netfilter-persistent save"
            echo "- Confirm sshd is running and listening on port 22 on the host."
          }
          print_runtime_bootstrap_guidance() {
            echo "Remote runtime bootstrap guidance:"
            echo "- If sshd logs show accepted GitHub publickey sessions, SSH transport is working."
            echo "- Investigate the non-interactive runtime path next: PATH, nvm loading, node, npm, sudo, and systemd."
            echo "- GitHub Actions remote commands must not depend on .bashrc, .profile, prompt setup, or other interactive shell init."
          }

          ssh_opts=(
            -i "$SSH_KEY_PATH"
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o ConnectionAttempts=3
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o StrictHostKeyChecking=accept-new
          )
          run_minimal_remote_session() {
            timeout 20s ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" 'exit 0'
          }
          run_runtime_preflight() {
            timeout 90s ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" 'bash --noprofile --norc -se' <<'EOF'
          set -euo pipefail
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
          fi
          hash -r

          echo "[runtime-bootstrap] PATH=$PATH"
          for bin in bash node npm sudo systemctl; do
            if ! command -v "$bin" >/dev/null 2>&1; then
              echo "[runtime-bootstrap] missing required binary: $bin"
              exit 1
            fi
            echo "[runtime-bootstrap] ${bin}=$(command -v "$bin")"
          done
          echo "[runtime-bootstrap] node_version=$(node --version)"
          echo "[runtime-bootstrap] npm_version=$(npm --version)"
          echo "[runtime-bootstrap] systemd_version=$(systemctl --version | sed -n '1p')"
          if sudo systemctl is-active --quiet ssh || sudo systemctl is-active --quiet sshd; then
            echo "[runtime-bootstrap] ssh_service_active=yes"
          else
            echo "[runtime-bootstrap] ssh_service_active=no"
            exit 1
          fi
          echo "[runtime-bootstrap] Connected to $(hostname)"
          test -w /tmp
          df -h /tmp
          EOF
          }

          echo "Preflight phase 1/2: transport checks for $DEPLOY_HOST as $DEPLOY_USER"
          echo "Resolving deploy host..."
          if ! getent ahosts "$DEPLOY_HOST"; then
            echo "Failed to resolve $DEPLOY_HOST before attempting SSH."
            print_ssh_network_guidance
            exit 1
          fi
          echo "Checking raw TCP reachability to $DEPLOY_HOST:22 before SSH banner exchange..."
          if ! timeout 20 bash -lc 'exec 3<>"/dev/tcp/$1/$2"' _ "$DEPLOY_HOST" "22"; then
            echo "Raw TCP connection to $DEPLOY_HOST:22 failed before SSH authentication."
            echo "This usually points to OCI ingress, Ubuntu iptables, or sshd not listening on port 22."
            print_ssh_network_guidance
            exit 1
          fi
          echo "TCP port 22 is reachable. Checking a minimal authenticated SSH session next."
          for attempt in 1 2 3; do
            if run_minimal_remote_session
            then
              echo "Minimal authenticated SSH session succeeded."
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "SSH transport preflight failed after ${attempt} attempts."
              echo "Raw TCP reachability succeeded, but the workflow could not complete a minimal authenticated session."
              print_ssh_network_guidance
              exit 1
            fi
            echo "Minimal authenticated SSH session attempt ${attempt} failed. Retrying in 15 seconds..."
            sleep 15
          done

          echo "Preflight phase 2/2: runtime bootstrap checks in a non-interactive remote shell."
          for attempt in 1 2 3; do
            if run_runtime_preflight
            then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Remote runtime bootstrap preflight failed after ${attempt} attempts."
              echo "SSH transport succeeded, so the failure is inside the remote non-interactive command path."
              print_runtime_bootstrap_guidance
              exit 1
            fi
            echo "Remote runtime bootstrap attempt ${attempt} failed. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Copy Agent Package And Scripts
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          ssh_opts=(
            -i "$SSH_KEY_PATH"
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o ConnectionAttempts=3
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o StrictHostKeyChecking=accept-new
          )
          for attempt in 1 2 3; do
            if timeout 5m scp "${ssh_opts[@]}" earlymark-agent-deploy.tgz "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_ARCHIVE_PATH" && \
              timeout 2m scp "${ssh_opts[@]}" ops/deploy/livekit-worker-install.sh "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_INSTALL_SCRIPT_PATH" && \
              timeout 2m scp "${ssh_opts[@]}" ops/deploy/livekit-worker-verify.sh "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_VERIFY_SCRIPT_PATH"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Agent package/script copy failed after ${attempt} attempts."
              exit 1
            fi
            echo "Agent package/script copy attempt ${attempt} failed. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Install and Restart Worker
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          VOICE_AGENT_WEBHOOK_SECRET: ${{ secrets.VOICE_AGENT_WEBHOOK_SECRET || secrets.LIVEKIT_API_SECRET }}
          EARLYMARK_INBOUND_PHONE_NUMBER: ${{ secrets.VOICE_MONITOR_PROBE_TARGET_NUMBER || secrets.EARLYMARK_INBOUND_PHONE_NUMBER || secrets.EARLYMARK_PHONE_NUMBER || secrets.TWILIO_PHONE_NUMBER }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          ssh_opts=(
            -i "$SSH_KEY_PATH"
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o ConnectionAttempts=3
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o StrictHostKeyChecking=accept-new
          )
          remote_archive_escaped="$(printf '%q' "$REMOTE_ARCHIVE_PATH")"
          deploy_sha_escaped="$(printf '%q' "$GITHUB_SHA")"
          voice_host_id_escaped="$(printf '%q' "$VOICE_HOST_ID")"
          app_url_escaped="$(printf '%q' "${NEXT_PUBLIC_APP_URL:-}")"
          webhook_secret_escaped="$(printf '%q' "${VOICE_AGENT_WEBHOOK_SECRET:-}")"
          inbound_phone_escaped="$(printf '%q' "${EARLYMARK_INBOUND_PHONE_NUMBER:-}")"
          deepgram_api_key_escaped="$(printf '%q' "${DEEPGRAM_API_KEY:-}")"
          groq_api_key_escaped="$(printf '%q' "${GROQ_API_KEY:-}")"
          deepinfra_api_key_escaped="$(printf '%q' "${DEEPINFRA_API_KEY:-}")"
          supabase_url_escaped="$(printf '%q' "${NEXT_PUBLIC_SUPABASE_URL:-}")"
          supabase_service_role_key_escaped="$(printf '%q' "${SUPABASE_SERVICE_ROLE_KEY:-}")"
          remote_install_script_escaped="$(printf '%q' "$REMOTE_INSTALL_SCRIPT_PATH")"
          for attempt in 1 2 3; do
            if timeout 10m ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "REMOTE_ARCHIVE_PATH=${remote_archive_escaped} DEPLOY_GIT_SHA=${deploy_sha_escaped} VOICE_HOST_ID=${voice_host_id_escaped} SYNCED_APP_URL=${app_url_escaped} SYNCED_VOICE_AGENT_WEBHOOK_SECRET=${webhook_secret_escaped} SYNCED_EARLYMARK_INBOUND_PHONE_NUMBER=${inbound_phone_escaped} SYNCED_DEEPGRAM_API_KEY=${deepgram_api_key_escaped} SYNCED_GROQ_API_KEY=${groq_api_key_escaped} SYNCED_DEEPINFRA_API_KEY=${deepinfra_api_key_escaped} SYNCED_NEXT_PUBLIC_SUPABASE_URL=${supabase_url_escaped} SYNCED_SUPABASE_SERVICE_ROLE_KEY=${supabase_service_role_key_escaped} REMOTE_INSTALL_SCRIPT_PATH=${remote_install_script_escaped} bash --noprofile --norc -se" <<'EOF'
          set -euo pipefail
          sed -i 's/\r$//' "$REMOTE_INSTALL_SCRIPT_PATH"
          chmod 700 "$REMOTE_INSTALL_SCRIPT_PATH"
          bash --noprofile --norc "$REMOTE_INSTALL_SCRIPT_PATH"
          EOF
            then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Worker install and restart failed after ${attempt} attempts."
              echo "Transport and runtime bootstrap succeeded earlier; the remaining failure is in install/restart logic on the host."
              exit 1
            fi
            echo "Worker install and restart attempt ${attempt} failed. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Verify Worker Heartbeats
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          VOICE_AGENT_WEBHOOK_SECRET: ${{ secrets.VOICE_AGENT_WEBHOOK_SECRET || secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          ssh_opts=(
            -i "$SSH_KEY_PATH"
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o ConnectionAttempts=3
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o StrictHostKeyChecking=accept-new
          )
          app_url_escaped="$(printf '%q' "$NEXT_PUBLIC_APP_URL")"
          webhook_secret_escaped="$(printf '%q' "$VOICE_AGENT_WEBHOOK_SECRET")"
          deploy_sha_escaped="$(printf '%q' "$GITHUB_SHA")"
          voice_host_id_escaped="$(printf '%q' "$VOICE_HOST_ID")"
          remote_verify_script_escaped="$(printf '%q' "$REMOTE_VERIFY_SCRIPT_PATH")"
          for attempt in 1 2 3; do
            if timeout 6m ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "NEXT_PUBLIC_APP_URL=${app_url_escaped} VOICE_AGENT_WEBHOOK_SECRET=${webhook_secret_escaped} DEPLOY_GIT_SHA=${deploy_sha_escaped} VOICE_HOST_ID=${voice_host_id_escaped} REMOTE_VERIFY_SCRIPT_PATH=${remote_verify_script_escaped} bash --noprofile --norc -se" <<'EOF'
          set -euo pipefail
          sed -i 's/\r$//' "$REMOTE_VERIFY_SCRIPT_PATH"
          chmod 700 "$REMOTE_VERIFY_SCRIPT_PATH"
          bash --noprofile --norc "$REMOTE_VERIFY_SCRIPT_PATH"
          EOF
            then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Worker heartbeat verification failed after ${attempt} attempts."
              echo "Transport and runtime bootstrap succeeded earlier; the remaining failure is in post-deploy heartbeat convergence or verification."
              exit 1
            fi
            echo "Worker heartbeat verification attempt ${attempt} failed. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Cleanup SSH Credentials
        if: always() && env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          if [ -n "${SSH_KEY_PATH:-}" ]; then
            rm -f "$SSH_KEY_PATH"
          fi

      - name: Skip Unconfigured Target
        if: env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_KEY == ''
        run: echo "Skipping ${{ matrix.target }} because its SSH secrets are not configured."

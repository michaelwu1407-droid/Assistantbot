name: Deploy LiveKit Agent
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'livekit-agent/**'
      - '.github/workflows/deploy-livekit.yml'
concurrency:
  group: deploy-livekit-agent
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Package Agent
        run: |
          tar \
            --exclude='livekit-agent/node_modules' \
            --exclude='livekit-agent/.env.local' \
            --exclude='livekit-agent/.env.*.local' \
            -czf livekit-agent-deploy.tgz \
            livekit-agent

      - name: Copy Agent Package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: livekit-agent-deploy.tgz
          target: /tmp
          strip_components: 0

      - name: Restart Agent
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_GIT_SHA: ${{ github.sha }}
          LIVEKIT_AGENT_ENV_B64: ${{ secrets.LIVEKIT_AGENT_ENV_B64 }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_GIT_SHA,LIVEKIT_AGENT_ENV_B64
          script: |
            set -eu
            agent_ps() {
              ps -eo pid= -o args= | grep -E '[ /]tsx agent\.ts start|node .*agent\.ts start' | grep -v grep || true
            }
            agent_pids() {
              agent_ps | awk '{print $1}' | tr '\n' ' '
            }
            pid_in_list() {
              needle="$1"
              haystack="${2:-}"
              case " $haystack " in
                *" $needle "*) return 0 ;;
                *) return 1 ;;
              esac
            }
            candidate_running() {
              current_pids="$(agent_pids)"
              if [ -n "${CANDIDATE_PID:-}" ] && pid_in_list "$CANDIDATE_PID" "$current_pids"; then
                return 0
              fi
              for pid in $current_pids; do
                if ! pid_in_list "$pid" "${PREV_MATCHING_PIDS:-}"; then
                  CANDIDATE_PID="$pid"
                  return 0
                fi
              done
              return 1
            }
            PREV_MATCHING_PIDS="$(agent_pids)"
            PREV_PID=""
            if [ -f /tmp/agent.pid ]; then
              PREV_PID="$(cat /tmp/agent.pid || true)"
            fi
            if [ -z "$PREV_PID" ] || ! pid_in_list "$PREV_PID" "$PREV_MATCHING_PIDS"; then
              for pid in $PREV_MATCHING_PIDS; do
                PREV_PID="$pid"
                break
              done
            fi
            TMP_AGENT_DIR="/tmp/livekit-agent"
            TMP_ENV_PATH="$TMP_AGENT_DIR/.env.local"
            PERSISTENT_ENV_DIR="$HOME/.config/earlymark"
            PERSISTENT_ENV_PATH="$PERSISTENT_ENV_DIR/livekit-agent.env"
            LEGACY_ENV_PATH="/opt/livekit-agent/.env.local"
            mkdir -p "$TMP_AGENT_DIR" "$PERSISTENT_ENV_DIR"
            chmod 700 "$PERSISTENT_ENV_DIR" || true
            if [ -n "${LIVEKIT_AGENT_ENV_B64:-}" ]; then
              if ! printf '%s' "$LIVEKIT_AGENT_ENV_B64" | base64 -d > "$PERSISTENT_ENV_PATH"; then
                echo "LIVEKIT_AGENT_ENV_B64 is not valid base64."
                if [ -n "$PREV_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
                  echo "Previous agent is still running with PID $PREV_PID"
                  ps -p "$PREV_PID" -o pid= -o args=
                  echo "$PREV_PID" > /tmp/agent.pid
                  echo "Keeping previous worker active; skipping restart."
                  exit 0
                fi
                exit 1
              fi
              chmod 600 "$PERSISTENT_ENV_PATH"
              echo "Restored voice-agent env from GitHub secret LIVEKIT_AGENT_ENV_B64."
            elif [ -f "$TMP_ENV_PATH" ]; then
              cp "$TMP_ENV_PATH" "$PERSISTENT_ENV_PATH"
              chmod 600 "$PERSISTENT_ENV_PATH"
              echo "Persisted existing voice-agent env from $TMP_ENV_PATH."
            elif [ -f "$LEGACY_ENV_PATH" ]; then
              cp "$LEGACY_ENV_PATH" "$PERSISTENT_ENV_PATH"
              chmod 600 "$PERSISTENT_ENV_PATH"
              echo "Restored voice-agent env from legacy path $LEGACY_ENV_PATH."
            fi
            if [ ! -f "$PERSISTENT_ENV_PATH" ]; then
              echo "Missing persistent voice-agent env file."
              echo "Expected one of:"
              echo "  $PERSISTENT_ENV_PATH"
              echo "  $LEGACY_ENV_PATH"
              echo "Or configure the GitHub secret LIVEKIT_AGENT_ENV_B64 with base64-encoded livekit-agent/.env.local contents."
              if [ -n "$PREV_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
                echo "Previous agent is still running with PID $PREV_PID"
                ps -p "$PREV_PID" -o pid= -o args=
                echo "$PREV_PID" > /tmp/agent.pid
                echo "Keeping previous worker active; skipping restart."
                exit 0
              fi
              exit 1
            fi
            find "$TMP_AGENT_DIR" -mindepth 1 -maxdepth 1 ! -name '.env.local' -exec rm -rf {} +
            cp "$PERSISTENT_ENV_PATH" "$TMP_ENV_PATH"
            chmod 600 "$TMP_ENV_PATH"
            cd "$TMP_AGENT_DIR"
            if [ ! -f /tmp/livekit-agent-deploy.tgz ]; then
              echo "Missing /tmp/livekit-agent-deploy.tgz on remote host."
              if [ -n "$PREV_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
                echo "Previous agent is still running with PID $PREV_PID"
                ps -p "$PREV_PID" -o pid= -o args=
                echo "$PREV_PID" > /tmp/agent.pid
                echo "Keeping previous worker active; skipping restart."
                exit 0
              fi
              exit 1
            fi
            tar -xzf /tmp/livekit-agent-deploy.tgz -C /tmp/livekit-agent --strip-components=1
            npm ci --omit=dev --no-audit --no-fund
            if ! node --input-type=module -e "import { config } from 'dotenv'; config({ path: '.env.local' }); const missing = ['LIVEKIT_URL', 'LIVEKIT_API_KEY', 'LIVEKIT_API_SECRET', 'DEEPGRAM_API_KEY', 'CARTESIA_API_KEY'].filter((key) => !process.env[key]); if (!(process.env.GROQ_API_KEY || process.env.DEEPINFRA_API_KEY)) missing.push('GROQ_API_KEY or DEEPINFRA_API_KEY'); if (missing.length) { console.error('Missing required voice-agent env vars: ' + missing.join(', ')); process.exit(1); }"; then
              if [ -n "$PREV_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
                echo "Preflight failed, but previous agent is still running with PID $PREV_PID"
                ps -p "$PREV_PID" -o pid= -o args=
                echo "$PREV_PID" > /tmp/agent.pid
                echo "Keeping previous worker active; skipping restart."
                exit 0
              fi
              exit 1
            fi
            : > /tmp/agent.log
            DEPLOY_GIT_SHA="$DEPLOY_GIT_SHA" nohup ./node_modules/.bin/tsx agent.ts start > /tmp/agent.log 2>&1 < /dev/null &
            CANDIDATE_PID="$!"
            STARTED=0
            for _ in 1 2 3 4 5 6; do
              if candidate_running; then
                STARTED=1
                break
              fi
              sleep 2
            done
            if [ "$STARTED" -ne 1 ]; then
              echo "Candidate agent never stayed up long enough to be considered started."
              tail -n 80 /tmp/agent.log || true
              if [ -n "$PREV_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
                echo "Previous agent is still running with PID $PREV_PID"
                ps -p "$PREV_PID" -o pid= -o args=
                echo "$PREV_PID" > /tmp/agent.pid
                echo "Keeping previous worker active; skipping restart."
                exit 0
              fi
              exit 1
            fi
            agent_ps
            sleep 5
            if ! candidate_running; then
              echo "Candidate agent exited during startup grace period."
              tail -n 80 /tmp/agent.log || true
              if [ -n "$PREV_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
                echo "Previous agent is still running with PID $PREV_PID"
                ps -p "$PREV_PID" -o pid= -o args=
                echo "$PREV_PID" > /tmp/agent.pid
                echo "Keeping previous worker active; skipping restart."
                exit 0
              fi
              exit 1
            fi
            if [ -n "$PREV_PID" ] && [ "$PREV_PID" != "$CANDIDATE_PID" ] && ps -p "$PREV_PID" >/dev/null 2>&1; then
              kill "$PREV_PID" 2>/dev/null || true
              sleep 2
            fi
            if [ -n "${CANDIDATE_PID:-}" ]; then
              echo "$CANDIDATE_PID" > /tmp/agent.pid
            fi
            tail -n 40 /tmp/agent.log || true

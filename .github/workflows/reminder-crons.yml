name: Reminder Crons

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Run booking and follow-up reminder jobs
        env:
          APP_BASE_URL: ${{ secrets.APP_URL || secrets.NEXT_PUBLIC_APP_URL }}
          OPS_KEY: ${{ secrets.TELEMETRY_ADMIN_KEY || secrets.CRON_SECRET }}
        run: |
          set -eu
          if [ -z "${APP_BASE_URL:-}" ]; then
            echo "APP_URL or NEXT_PUBLIC_APP_URL secret is missing."
            exit 1
          fi
          if [ -z "${OPS_KEY:-}" ]; then
            echo "TELEMETRY_ADMIN_KEY or CRON_SECRET secret is missing."
            exit 1
          fi
          APP_BASE_URL="${APP_BASE_URL%/}"
          if [ "${APP_BASE_URL}" = "https://earlymark.ai" ]; then
            APP_BASE_URL="https://www.earlymark.ai"
          fi

          for path in /api/cron/booking-reminders /api/cron/followup-reminders; do
            response_file="$(mktemp)"
            status_code="$(
              curl --location --show-error --silent \
                --output "${response_file}" \
                --write-out "%{http_code}" \
                -H "Authorization: Bearer ${OPS_KEY}" \
                "${APP_BASE_URL%/}${path}"
            )"
            cat "${response_file}"
            if [ "${status_code}" -ne 200 ]; then
              echo "${path} returned HTTP ${status_code}"
              exit 1
            fi
          done

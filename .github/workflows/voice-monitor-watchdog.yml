name: Voice Monitor Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check voice monitor freshness
        env:
          APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          OPS_KEY: ${{ secrets.TELEMETRY_ADMIN_KEY || secrets.CRON_SECRET }}
        run: |
          node scripts/run-ops-monitor.mjs \
            --path /api/cron/voice-monitor-watchdog \
            --label voice-monitor-watchdog

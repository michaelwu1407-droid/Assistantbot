name: Voice Monitor Watchdog

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check voice monitor freshness
        env:
          APP_BASE_URL: ${{ secrets.APP_URL || secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          OPS_KEY: ${{ secrets.TELEMETRY_ADMIN_KEY || secrets.CRON_SECRET }}
          VOICE_MONITOR_DEADMAN_URL: ${{ secrets.VOICE_MONITOR_DEADMAN_URL }}
        run: |
          set -eu
          if [ -z "${APP_BASE_URL:-}" ]; then
            echo "APP_URL or NEXT_PUBLIC_APP_URL secret is missing."
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_SECRET secret is missing."
            exit 1
          fi
          APP_BASE_URL="${APP_BASE_URL%/}"
          if [ "${APP_BASE_URL}" = "https://earlymark.ai" ]; then
            APP_BASE_URL="https://www.earlymark.ai"
          fi
          response_file="$(mktemp)"
          status_code="$(
            curl --location --show-error --silent \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "x-ops-key: ${OPS_KEY}" \
              "${APP_BASE_URL%/}/api/cron/voice-monitor-watchdog"
          )"
          cat "${response_file}"
          if [ "${status_code}" -ne 200 ]; then
            echo "voice-monitor-watchdog returned HTTP ${status_code}"
            exit 1
          fi
          python - "${response_file}" <<'PY'
          import json, sys
          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              payload = json.load(handle)
          overall_status = payload.get("status")
          voice_status = ((payload.get("voiceAgentHealth") or {}).get("status"))
          probe_status = ((payload.get("syntheticProbeHealth") or {}).get("status"))
          passive_status = ((payload.get("passiveTrafficHealth") or {}).get("status"))

          if voice_status == "unhealthy":
              raise SystemExit(f"voice-monitor-watchdog returned unhealthy voiceAgentHealth: {voice_status}")
          if probe_status == "unhealthy":
              raise SystemExit(f"voice-monitor-watchdog returned unhealthy syntheticProbeHealth: {probe_status}")

          if overall_status == "unhealthy" and passive_status != "unhealthy":
              raise SystemExit(f"voice-monitor-watchdog returned unhealthy status: {overall_status}")
          PY
          if [ -n "${VOICE_MONITOR_DEADMAN_URL:-}" ]; then
            curl --fail --show-error --silent "${VOICE_MONITOR_DEADMAN_URL}"
          fi

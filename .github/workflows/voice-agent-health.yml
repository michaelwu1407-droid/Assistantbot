name: Voice Agent Health

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run voice agent health audit
        env:
          APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          OPS_KEY: ${{ secrets.TELEMETRY_ADMIN_KEY || secrets.CRON_SECRET }}
          VOICE_MONITOR_DEADMAN_URL: ${{ secrets.VOICE_MONITOR_DEADMAN_URL }}
        run: |
          node scripts/run-ops-monitor.mjs \
            --path /api/cron/voice-agent-health \
            --label voice-agent-health \
            --deadman-url "${VOICE_MONITOR_DEADMAN_URL:-}"

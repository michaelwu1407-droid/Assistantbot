name: CI Quality Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-quality-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
